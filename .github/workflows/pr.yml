name: PR Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, Test & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-infos

      # Create the .env files from GitHub Secrets so the app can load them.
      # On CI there are no real .env files (they're gitignored).
      # The assets declared in pubspec.yaml must exist at build time.
      - name: Create .env files from secrets
        run: |
          printf "SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nSENTRY_DSN=%s\nAPP_ENV=dev\nAPP_VERSION=0.1.0\n" \
            "$SUPABASE_URL_DEV" "$SUPABASE_ANON_KEY_DEV" "$SENTRY_DSN_DEV" > .env.dev
          cp .env.dev .env.staging
          cp .env.dev .env.prod
        env:
          SUPABASE_URL_DEV: ${{ secrets.SUPABASE_URL_DEV }}
          SUPABASE_ANON_KEY_DEV: ${{ secrets.SUPABASE_ANON_KEY_DEV }}
          SENTRY_DSN_DEV: ${{ secrets.SENTRY_DSN_DEV }}

      - name: Run tests
        run: flutter test --coverage

      - name: Check coverage threshold (70%)
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 70

      - name: Build Android APK (dev, debug)
        run: flutter build apk --debug --flavor dev -t lib/main_dev.dart

      - name: Build Web (dev)
        run: flutter build web --flavor dev -t lib/main_dev.dart
