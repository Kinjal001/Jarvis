name: Main Branch — Staging Deploy

on:
  push:
    branches: [main]

jobs:
  staging-build:
    name: Build & Deploy Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create .env files from secrets
        run: |
          printf "SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nSENTRY_DSN=%s\nAPP_ENV=dev\nAPP_VERSION=0.1.0\n" \
            "$SUPABASE_URL_DEV" "$SUPABASE_ANON_KEY_DEV" "$SENTRY_DSN_DEV" > .env.dev
          printf "SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nSENTRY_DSN=%s\nAPP_ENV=staging\nAPP_VERSION=0.1.0\n" \
            "$SUPABASE_URL_STAGING" "$SUPABASE_ANON_KEY_STAGING" "$SENTRY_DSN_DEV" > .env.staging
          cp .env.staging .env.prod
        env:
          SUPABASE_URL_DEV: ${{ secrets.SUPABASE_URL_DEV }}
          SUPABASE_ANON_KEY_DEV: ${{ secrets.SUPABASE_ANON_KEY_DEV }}
          SUPABASE_URL_STAGING: ${{ secrets.SUPABASE_URL_STAGING }}
          SUPABASE_ANON_KEY_STAGING: ${{ secrets.SUPABASE_ANON_KEY_STAGING }}
          SENTRY_DSN_DEV: ${{ secrets.SENTRY_DSN_DEV }}

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Build Android APK (staging)
        run: flutter build apk --flavor staging -t lib/main_staging.dart

      - name: Build Web (staging)
        run: flutter build web --flavor staging -t lib/main_staging.dart

      # Uncomment when Firebase App Distribution is set up (Phase 5)
