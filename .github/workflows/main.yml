name: Main Branch — Deploy

on:
  push:
    branches: [main]

# Needed for GitHub Pages deployment
permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # Quality checks already ran on the PR and passed before merge.
      # main.yml skips re-running analyze/tests to keep deploy fast.
      # If a direct push somehow bypasses the PR gate (emergency hotfix),
      # run tests manually with: flutter test --coverage

      - name: Create .env files from secrets
        run: |
          printf "SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nSENTRY_DSN=%s\nAPP_ENV=dev\nAPP_VERSION=0.1.0\n" \
            "$SUPABASE_URL_DEV" "$SUPABASE_ANON_KEY_DEV" "$SENTRY_DSN_DEV" > .env.dev
          cp .env.dev .env.staging
          cp .env.dev .env.prod
        env:
          SUPABASE_URL_DEV: ${{ secrets.SUPABASE_URL_DEV }}
          SUPABASE_ANON_KEY_DEV: ${{ secrets.SUPABASE_ANON_KEY_DEV }}
          SENTRY_DSN_DEV: ${{ secrets.SENTRY_DSN_DEV }}

      # sqlite3.wasm is downloaded (not committed) to keep binary out of git.
      # drift_worker.js is compiled from web/drift_worker.dart at build time.
      - name: Prepare drift web assets
        run: |
          curl -L -o web/sqlite3.wasm \
            https://github.com/simolus3/sqlite3.dart/releases/download/sqlite3-2.9.4/sqlite3.wasm
          dart compile js -O2 -o web/drift_worker.js web/drift_worker.dart

      # Build web with base-href matching the GitHub Pages repo path.
      # Uses dev config so the live site talks to the dev Supabase project.
      - name: Build Web (for GitHub Pages)
        run: flutter build web -t lib/main_dev.dart --base-href /Jarvis/

      # Deploy build/web to the gh-pages branch.
      # GitHub Pages serves from that branch automatically.
      # The live URL will be: https://kinjal001.github.io/Jarvis/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

      # When ready to resume Android distribution (Phase 5):
      # - Re-add: flutter build apk --flavor staging -t lib/main_staging.dart
      # - Re-add: Firebase App Distribution upload step
      # - Re-add: Sentry source map upload step
