name: Main Branch — Staging Deploy

on:
  push:
    branches: [main]

jobs:
  staging-build:
    name: Build & Deploy Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test --coverage

      - name: Build Android (staging)
        run: flutter build apk --flavor staging -t lib/main_staging.dart
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_STAGING }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_STAGING }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_DEV }}

      - name: Build Web (staging)
        run: flutter build web --flavor staging -t lib/main_staging.dart

